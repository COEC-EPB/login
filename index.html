<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Login - ADD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root {
  --azul: #0097CE;
  --azul-escuro: #0079a6;
  --laranja: #F36F21;
  --cinza-bg: #eef3f7;
}
body {
  background: var(--cinza-bg);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  font-family: "Segoe UI", Roboto, sans-serif;
}
.login-card {
  width: 380px;
  padding: 32px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.12);
  border-top: 6px solid var(--laranja);
  text-align: center;
}
.icon-box {
  width: 70px;
  height: 70px;
  margin: 0 auto 12px;
  background: var(--azul);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}
.icon-box i {
  color: white;
  font-size: 36px;
}
label {
  display:block;
  text-align:left;
  font-weight:600;
  margin:8px 0 4px;
}
input {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #cfd8dc;
}
button {
  width:100%;
  margin-top:12px;
  padding:14px;
  font-weight:700;
  border:none;
  background:var(--azul);
  color:#fff;
  border-radius:10px;
}
button:hover { background: var(--azul-escuro); }
.esquecer {
  margin-top:10px;
  cursor:pointer;
  color:var(--azul-escuro);
  font-weight:600;
}
#erro { color:#d60000; font-weight:600; margin-top:10px; }
.modal-bg {
  position:fixed; inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-box {
  background:white;
  padding:24px;
  border-radius:14px;
  width:360px;
}
.btn-secondary {
  background:#6c757d;
}
.msg { color:#d60000; font-weight:600; margin-top:8px; }
</style>
</head>

<body>

<div class="login-card">
  <div class="icon-box">
    <i class="bi bi-person-lock"></i>
  </div>

  <h3>Login ADD</h3>

  <label>Matrícula</label>
  <input id="matricula">

  <label>Senha</label>
  <input id="senha" type="password">

  <button onclick="logar()">Entrar</button>
  <div class="esquecer" onclick="abrirRecuperacao()">Esqueci minha senha</div>

  <p id="erro"></p>
</div>

<!-- MODAIS -->
<div class="modal-bg" id="modalPrimeiroAcesso">
  <div class="modal-box">
    <h4>Primeiro acesso</h4>
    <label>Nova senha</label>
    <input id="novaSenha" type="password">
    <label>Confirmar senha</label>
    <input id="confSenha" type="password">
    <button onclick="salvarNovaSenha()">Salvar</button>
    <button class="btn-secondary" onclick="fecharModal('modalPrimeiroAcesso')">Cancelar</button>
    <p id="erroSenha" class="msg"></p>
  </div>
</div>

<div class="modal-bg" id="modalRecuperar">
  <div class="modal-box">
    <h4>Recuperar acesso</h4>
    <label>Matrícula</label>
    <input id="recMatricula">
    <label>CPF</label>
    <input id="recCpf">
    <button onclick="confirmarRecuperacao()">Confirmar</button>
    <button class="btn-secondary" onclick="fecharModal('modalRecuperar')">Cancelar</button>
    <p id="erroRec" class="msg"></p>
  </div>
</div>

<div class="modal-bg" id="modalNovaSenha">
  <div class="modal-box">
    <h4>Nova senha</h4>
    <label>Senha</label>
    <input id="recNovaSenha" type="password">
    <label>Confirmar</label>
    <input id="recConfSenha" type="password">
    <button onclick="finalizarRecuperacao()">Salvar</button>
    <button class="btn-secondary" onclick="fecharModal('modalNovaSenha')">Cancelar</button>
    <p id="erroNova" class="msg"></p>
  </div>
</div>

<script>
const BASE_URL = "https://long-hall-0aaa.pedro-fillype.workers.dev";
let memoryToken = null;
let resetToken = null;

/* ===== helpers ===== */
function setToken(t){
  memoryToken = t;
  localStorage.setItem("token", t);
  sessionStorage.setItem("token", t);
}
function getToken(){
  return memoryToken
    || localStorage.getItem("token")
    || sessionStorage.getItem("token");
}
function apiFetch(url, options = {}){
  const token = getToken();
  const headers = new Headers(options.headers || {});
  if(token) headers.set("Authorization", `Bearer ${token}`);
  return fetch(url,{ ...options, headers });
}
function abrirModal(id){ document.getElementById(id).style.display="flex"; }
function fecharModal(id){ document.getElementById(id).style.display="none"; }
const limparCPF = v => String(v||"").replace(/\D/g,"");

/* ===== login ===== */

async function logar(){
  const matriculaInput = document.getElementById("matricula");
  const senhaInput = document.getElementById("senha");
  const erro = document.getElementById("erro");

  const matricula = matriculaInput.value.trim();
  const senha = senhaInput.value.trim();
  erro.innerText = "";

  if (!matricula || !senha) {
    erro.innerText = "Preencha matrícula e senha!";
    return;
  }

  const resp = await fetch(`${BASE_URL}/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ matricula, senha })
  });

  const json = await resp.json();

  if (!json.ok) {
    erro.innerText = json.error || "Credenciais inválidas";
    return;
  }

  // ✅ salva token
  setToken(json.token);

  // ✅ sempre use o user do backend
  localStorage.setItem("matricula", json.user.matricula);
  localStorage.setItem("usuarioLogado","sim");

  if (json.primeiroAcesso) {
    window.matriculaTemp = json.user.matricula;
    abrirModal("modalPrimeiroAcesso");
    return;
  }

  location.href = "https://coec-epb.github.io/prestacao_de_contas/";
}



/* ===== primeiro acesso ===== */
async function salvarNovaSenha(){
  if(novaSenha.value !== confSenha.value){
    erroSenha.innerText="Senhas não conferem";
    return;
  }
  const resp = await apiFetch(`${BASE_URL}/trocar_senha`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      matricula: window.matriculaTemp,
      novaSenha: novaSenha.value
    })
  });
  const json = await resp.json();
  if(!json.ok){
    erroSenha.innerText=json.error||"Erro";
    return;
  }
  localStorage.setItem("matricula", window.matriculaTemp);
  localStorage.setItem("usuarioLogado","sim");
  location.href="https://coec-epb.github.io/prestacao_de_contas/";
}

/* ===== recuperar senha ===== */
function abrirRecuperacao(){
  recMatricula.value = matricula.value;
  recCpf.value="";
  abrirModal("modalRecuperar");
}

async function confirmarRecuperacao(){
  const cpf = limparCPF(recCpf.value);
  const resp = await fetch(`${BASE_URL}/recuperar_senha`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ matricula: recMatricula.value, cpf })
  });
  const json = await resp.json();
  if(!json.ok){
    erroRec.innerText=json.error||"Erro";
    return;
  }
  resetToken = json.token;
  fecharModal("modalRecuperar");
  abrirModal("modalNovaSenha");
}

async function finalizarRecuperacao(){
  if(recNovaSenha.value !== recConfSenha.value){
    erroNova.innerText="Senhas não conferem";
    return;
  }
  const resp = await fetch(`${BASE_URL}/definir_nova_senha`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ token: resetToken, novaSenha: recNovaSenha.value })
  });
  const json = await resp.json();
  if(!json.ok){
    erroNova.innerText=json.error||"Erro";
    return;
  }
  alert("Senha redefinida. Faça login.");
  fecharModal("modalNovaSenha");
}
</script>
</body>
</html>
